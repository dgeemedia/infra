services:

  postgres:
    image: postgres:16-alpine
    container_name: elorge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: elorge
      POSTGRES_PASSWORD: elorge_password
      POSTGRES_DB: elorge_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U elorge -d elorge_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: elorge_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  api:
    build:
      context: ../../   # KEEP this (monorepo support)
      dockerfile: infra/docker/api.Dockerfile
      target: development
    container_name: elorge_api
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://elorge:elorge_password@postgres:5432/elorge_db
      REDIS_URL: redis://redis:6379
    env_file:
      - ../../apps/api/.env
    volumes:
      - ../../apps/api/src:/app/apps/api/src
      - ../../packages:/app/packages
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data: