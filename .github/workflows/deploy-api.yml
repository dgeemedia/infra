name: Deploy API → AWS ECS

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'infra/docker/api.Dockerfile'
      - '.github/workflows/deploy-api.yml'

concurrency:
  group: deploy-api
  cancel-in-progress: false

env:
  AWS_REGION:     eu-west-1
  ECR_REPOSITORY: elorge-api
  ECS_CLUSTER:    elorge-production
  ECS_SERVICE:    elorge-api-service
  CONTAINER_NAME: elorge-api
  TASK_FAMILY:    elorge-api

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     elorge
          POSTGRES_PASSWORD: elorge_test
          POSTGRES_DB:       elorge_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run test:ci
        env:
          NODE_ENV:                   test
          DATABASE_URL:               postgresql://elorge:elorge_test@localhost:5432/elorge_test
          REDIS_URL:                  redis://localhost:6379
          JWT_SECRET:                 ci_test_secret_minimum_64_chars_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          BANKLY_CLIENT_ID:           test
          BANKLY_CLIENT_SECRET:       test
          BANKLY_BASE_URL:            https://api.bankly.ng
          OPEN_EXCHANGE_RATES_APP_ID: test
          COMPLY_ADVANTAGE_API_KEY:   test

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag, push
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build \
            -f infra/docker/api.Dockerfile \
            --target production \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: chmod +x ./infra/aws/scripts/run-migrations.sh
      - run: ./infra/aws/scripts/run-migrations.sh production

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build, migrate]
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_FAMILY }} \
            --query taskDefinition > task-definition.json
      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ needs.build.outputs.image }}
      - name: Deploy rolling update
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.task-def.outputs.task-definition }}
          service:                    ${{ env.ECS_SERVICE }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
      - name: Health check
        run: |
          sleep 15
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.elorge.com/health || echo "000")
          [ "$STATUS" = "200" ] && echo "✅ Health OK" || (echo "❌ Health failed: $STATUS" && exit 1)
      - name: Summary
        run: |
          echo "✅ API deployed — commit ${{ github.sha }} by ${{ github.actor }}"
